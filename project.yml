name: AutoLocation
options:
  bundleIdPrefix: com.autolocation
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  AutoLocation:
    type: application
    platform: macOS
    sources:
      - path: AutoLocation
        excludes:
          - "**/.DS_Store"
      - path: Scripts/dist/bridge
        type: folder
        buildPhase: resources
        optional: true
    preBuildScripts:
      - name: Build Bridge Binary
        script: |
          if [ -f "${SRCROOT}/Scripts/build_bridge.sh" ]; then
            "${SRCROOT}/Scripts/build_bridge.sh"
          fi
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.autolocation.AutoLocation
        PRODUCT_NAME: AutoLocation
        INFOPLIST_FILE: AutoLocation/Info.plist
        CODE_SIGN_ENTITLEMENTS: AutoLocation/AutoLocation.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: "YES"
        COMBINE_HIDPI_IMAGES: true
    entitlements:
      path: AutoLocation/AutoLocation.entitlements
