name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build AutoLocation
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build Python bridge binary
        working-directory: Scripts
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install pymobiledevice3 pyinstaller
          chmod +x build_bridge.sh
          ./build_bridge.sh

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild archive \
            -scheme AutoLocation \
            -configuration Release \
            -archivePath build/AutoLocation.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES

      - name: Package app
        run: |
          cp -R build/AutoLocation.xcarchive/Products/Applications/AutoLocation.app build/AutoLocation.app
          codesign --force --deep --sign - build/AutoLocation.app
          cd build
          zip -r -y AutoLocation-macos.zip AutoLocation.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLocation-macos
          path: build/AutoLocation-macos.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/AutoLocation-macos.zip
          generate_release_notes: true
